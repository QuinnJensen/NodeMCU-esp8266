<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Device Settings</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#111;color:#e8e8e8;padding:1.5rem}
  h1{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem;color:#fff}
  a{color:#4f98a3;text-decoration:none;font-size:.85rem}
  a:hover{text-decoration:underline}
  .card{background:#1c1b19;border:1px solid #2a2a2a;border-radius:.5rem;padding:1.25rem;margin-bottom:1rem;max-width:420px}
  .card h2{font-size:.8rem;font-weight:500;color:#777;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
  .row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid #222}
  .row:last-child{border-bottom:none}
  .row label{font-size:.9rem;color:#ccc}
  .row .hint{font-size:.75rem;color:#555;margin-top:.15rem}
  /* Toggle switch */
  .switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:#333;border-radius:24px;transition:.2s;cursor:pointer}
  .slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#888;border-radius:50%;transition:.2s}
  input:checked+.slider{background:#01696f}
  input:checked+.slider:before{transform:translateX(20px);background:#fff}
  .btn{margin-top:1rem;padding:.5rem 1.25rem;background:#01696f;color:#fff;border:none;border-radius:.375rem;font-size:.875rem;cursor:pointer;transition:background .15s}
  .btn:hover{background:#0c4e54}
  .toast{margin-top:.75rem;font-size:.8rem;color:#6daa45;min-height:1em}
  .toast.err{color:#dd6974}
  nav{margin-bottom:1.25rem;font-size:.85rem}
</style>
</head>
<body>
<nav><a href="/">&larr; Back</a></nav>
<h1>Settings</h1>

<div class="card">
  <h2>Display &amp; LEDs</h2>
  <div class="row">
    <div>
      <label for="ledToggle">Blue LED flash</label>
      <div class="hint">Flashes on sensor reads when enabled</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="ledToggle">
      <span class="slider"></span>
    </label>
  </div>
  <button class="btn" id="saveBtn">Save</button>
  <div class="toast" id="toast"></div>
</div>

<script>
(function(){
  const toggle = document.getElementById('ledToggle');
  const toast  = document.getElementById('toast');
  const btn    = document.getElementById('saveBtn');

  function showToast(msg, err) {
    toast.textContent = msg;
    toast.className = 'toast' + (err ? ' err' : '');
    setTimeout(() => { toast.textContent = ''; toast.className = 'toast'; }, 3000);
  }

  // Load current value
  fetch('/api/config')
    .then(r => r.json())
    .then(d => { toggle.checked = !!d.led_enabled; })
    .catch(() => showToast('Could not load config', true));

  btn.addEventListener('click', () => {
    const body = new URLSearchParams();
    body.set('led_enabled', toggle.checked ? '1' : '0');
    fetch('/api/config/display', { method: 'POST', body })
      .then(r => r.json())
      .then(d => showToast(d.message, !d.ok))
      .catch(() => showToast('Save failed', true));
  });
})();
</script>
</body>
</html>
